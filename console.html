<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignment 1 & Bonus - Interactive Console</title>
  <style>
    :root {
      --bg-color: #0d1117;
      --panel-bg: #161b22;
      --border-color: #30363d;
      --text-color: #c9d1d9;
      --text-muted: #8b949e;
      --primary: #58a6ff;
      --accent: #ff7b72;
      --green: #7ee787;
      --yellow: #d2a8ff;
      --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--primary);
    }

    header p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-color);
      overflow: hidden;
    }

    .column:last-child {
      border-right: none;
    }

    .column-header {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .column-header span.badge {
      background: rgba(88, 166, 255, 0.15);
      color: var(--primary);
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
    }

    .console-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .console-item {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .console-item:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .item-summary {
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .item-label {
      color: var(--yellow);
    }

    .item-output {
      color: var(--green);
      font-weight: bold;
    }

    .code-details {
      display: none;
      border-top: 1px solid var(--border-color);
      background-color: rgba(0, 0, 0, 0.2);
      padding: 1rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--text-color);
      overflow-x: auto;
      white-space: pre;
    }

    .code-details.open {
      display: block;
    }

    .hint-click {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-left: 0.5rem;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Assignment 1 &amp; Bonus - Interactive Console</h1>
    </div>
    <div>
      <p>Click on any exercise to view the underlying JavaScript implementation code.</p>
    </div>
  </header>

  <main>
    <!-- Index.ts Section (Left) -->
    <section class="column">
      <div class="column-header">
        <span>Part 1: General Exercises (index.ts)</span>
        <span class="badge">15 Exercises</span>
      </div>
      <div class="console-list" id="index-list">
        <!-- Generated Dynamically -->
      </div>
    </section>

    <!-- Bonus.ts Section (Right) -->
    <section class="column">
      <div class="column-header">
        <span>Part 3: Bonus (bonus.ts)</span>
        <span class="badge">1 Exercise / 5 Steps</span>
      </div>
      <div class="console-list" id="bonus-list">
        <!-- Generated Dynamically -->
      </div>
    </section>
  </main>

  <script>
    // Implementation code mapping
    const codeStore = {
      q1: `export function q1_stringToNumber(str: string): number {
  return Number(str) + 7;
}`,
      q2: `export function q2_checkFalsy(val: any): any {
  if (!val) {
    return "Invalid";
  }
  return val;
}`,
      q3: `export function q3_printOddNumbers(): string {
  const results: number[] = [];
  for (let i = 1; i <= 10; i++) {
    if (i % 2 === 0) {
      continue;
    }
    results.push(i);
  }
  return results.join(", ");
}`,
      q4: `export function q4_filterEvenNumbers(arr: number[]): number[] {
  return arr.filter((num) => num % 2 === 0);
}`,
      q5: `export function q5_mergeArrays<T>(arr1: T[], arr2: T[]): T[] {
  return [...arr1, ...arr2];
}`,
      q6: `export function q6_getDayOfWeek(dayNum: number): string {
  switch (dayNum) {
    case 1: return "Sunday";
    case 2: return "Monday";
    case 3: return "Tuesday";
    case 4: return "Wednesday";
    case 5: return "Thursday";
    case 6: return "Friday";
    case 7: return "Saturday";
    default: return "Invalid Day";
  }
}`,
      q7: `export function q7_getStringLengths(arr: string[]): number[] {
  return arr.map((str) => str.length);
}`,
      q8: `export function q8_checkDivisibility(num: number): string {
  if (num % 3 === 0 && num % 5 === 0) {
    return "Divisible by both";
  } else if (num % 3 === 0) {
    return "Divisible by 3";
  } else if (num % 5 === 0) {
    return "Divisible by 5";
  } else {
    return "Not divisible by 3 or 5";
  }
}`,
      q9: `export const q9_square = (num: number): number => num * num;`,
      q10: `export function q10_formatPerson(person: Person): string {
  const { name, age } = person;
  return \`\${name} is \${age} years old\`;
}`,
      q11: `export function q11_sumMultiple(...numbers: number[]): number {
  return numbers.reduce((acc, curr) => acc + curr, 0);
}`,
      q12: `export function q12_delaySuccess(): Promise<string> {
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve("Success");
    }, 3000);
  });
}`,
      q13: `export function q13_findLargest(arr: number[]): number {
  if (arr.length === 0) {
    throw new Error("Array cannot be empty");
  }
  return Math.max(...arr);
}`,
      q14: `export function q14_getObjectKeys(obj: object): string[] {
  return Object.keys(obj);
}`,
      q15: `export function q15_splitString(str: string): string[] {
  return str.trim().split(/\\s+/);
}`,
      bonus: `export function createCounter(init: number): ReturnObj {
  let val = init;
  return {
    increment: () => {
      val += 1;
      return val;
    },
    decrement: () => {
      val -= 1;
      return val;
    },
    reset: () => {
      val = init;
      return val;
    },
  };
}`
    };

    // Live Execution Functions
    const q1_stringToNumber = (str) => Number(str) + 7;
    const q2_checkFalsy = (val) => !val ? "Invalid" : val;
    const q3_printOddNumbers = () => {
      const r = [];
      for(let i=1;i<=10;i++) { if(i%2!==0) r.push(i); }
      return r.join(", ");
    };
    const q4_filterEvenNumbers = (arr) => arr.filter(n => n % 2 === 0);
    const q5_mergeArrays = (a1, a2) => [...a1, ...a2];
    const q6_getDayOfWeek = (n) => {
      const days = ["", "Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
      return days[n] || "Invalid Day";
    };
    const q7_getStringLengths = (arr) => arr.map(s => s.length);
    const q8_checkDivisibility = (n) => {
      if (n % 3 === 0 && n % 5 === 0) return "Divisible by both";
      if (n % 3 === 0) return "Divisible by 3";
      if (n % 5 === 0) return "Divisible by 5";
      return "Not divisible by 3 or 5";
    };
    const q9_square = (n) => n * n;
    const q10_formatPerson = (p) => `${p.name} is ${p.age} years old`;
    const q11_sumMultiple = (...nums) => nums.reduce((a,c) => a+c, 0);
    const q12_delaySuccess = () => new Promise(res => setTimeout(() => res("Success"), 3000));
    const q13_findLargest = (arr) => Math.max(...arr);
    const q14_getObjectKeys = (obj) => Object.keys(obj);
    const q15_splitString = (str) => str.trim().split(/\s+/);

    // Counter instance for bonus
    let counterVal = 5;
    const counter = {
      increment: () => ++counterVal,
      decrement: () => --counterVal,
      reset: () => counterVal = 5
    };

    // Create Console UI Item
    function createConsoleItem(id, callLabel, outputVal, codeKey) {
      const container = document.createElement('div');
      container.className = 'console-item';

      const summary = document.createElement('div');
      summary.className = 'item-summary';
      summary.innerHTML = `
        <div>
          <span class="item-label">${callLabel}</span>
          <span class="hint-click">(Click to view code)</span>
        </div>
        <span class="item-output">${outputVal}</span>
      `;

      const details = document.createElement('pre');
      details.className = 'code-details';
      details.textContent = codeStore[codeKey];

      summary.addEventListener('click', () => {
        details.classList.toggle('open');
      });

      container.appendChild(summary);
      container.appendChild(details);
      return container;
    }

    // Build Index List
    const indexList = document.getElementById('index-list');
    indexList.appendChild(createConsoleItem('q1', 'q1_stringToNumber("123") + 7', q1_stringToNumber("123") + 7, 'q1'));
    indexList.appendChild(createConsoleItem('q2', 'q2_checkFalsy(0)', JSON.stringify(q2_checkFalsy(0)), 'q2'));
    indexList.appendChild(createConsoleItem('q3', 'q3_printOddNumbers()', `"${q3_printOddNumbers()}"`, 'q3'));
    indexList.appendChild(createConsoleItem('q4', 'q4_filterEvenNumbers([1,2,3,4,5])', JSON.stringify(q4_filterEvenNumbers([1,2,3,4,5])), 'q4'));
    indexList.appendChild(createConsoleItem('q5', 'q5_mergeArrays([1,2,3], [4,5,6])', JSON.stringify(q5_mergeArrays([1,2,3],[4,5,6])), 'q5'));
    indexList.appendChild(createConsoleItem('q6', 'q6_getDayOfWeek(2)', `"${q6_getDayOfWeek(2)}"`, 'q6'));
    indexList.appendChild(createConsoleItem('q7', 'q7_getStringLengths(["a", "ab", "abc"])', JSON.stringify(q7_getStringLengths(["a", "ab", "abc"])), 'q7'));
    indexList.appendChild(createConsoleItem('q8', 'q8_checkDivisibility(15)', `"${q8_checkDivisibility(15)}"`, 'q8'));
    indexList.appendChild(createConsoleItem('q9', 'q9_square(5)', q9_square(5), 'q9'));
    indexList.appendChild(createConsoleItem('q10', 'q10_formatPerson({ name: "John", age: 25 })', `"${q10_formatPerson({ name: "John", age: 25 })}"`, 'q10'));
    indexList.appendChild(createConsoleItem('q11', 'q11_sumMultiple(1,2,3,4,5)', q11_sumMultiple(1,2,3,4,5), 'q11'));
    indexList.appendChild(createConsoleItem('q13', 'q13_findLargest([1,3,7,2,4])', q13_findLargest([1,3,7,2,4]), 'q13'));
    indexList.appendChild(createConsoleItem('q14', 'q14_getObjectKeys({ name: "John", age: 30 })', JSON.stringify(q14_getObjectKeys({ name: "John", age: 30 })), 'q14'));
    indexList.appendChild(createConsoleItem('q15', 'q15_splitString("The quick brown fox")', JSON.stringify(q15_splitString("The quick brown fox")), 'q15'));

    // Handle q12 Async
    const q12Item = createConsoleItem('q12', 'q12_delaySuccess() (waiting 3s...)', 'Pending...', 'q12');
    indexList.appendChild(q12Item);
    q12_delaySuccess().then(res => {
      q12Item.querySelector('.item-output').textContent = `"${res}"`;
    });

    // Build Bonus List
    const bonusList = document.getElementById('bonus-list');
    bonusList.appendChild(createConsoleItem('b_init', 'const counter = createCounter(5)', 'Initialized to 5', 'bonus'));
    bonusList.appendChild(createConsoleItem('b1', 'counter.increment()', counter.increment(), 'bonus'));
    bonusList.appendChild(createConsoleItem('b2', 'counter.increment()', counter.increment(), 'bonus'));
    bonusList.appendChild(createConsoleItem('b3', 'counter.reset()', counter.reset(), 'bonus'));
    bonusList.appendChild(createConsoleItem('b4', 'counter.decrement()', counter.decrement(), 'bonus'));
    bonusList.appendChild(createConsoleItem('b5', 'counter.decrement()', counter.decrement(), 'bonus'));

  </script>
</body>
</html>
